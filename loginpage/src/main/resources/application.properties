spring.application.name=springsecuritybasic
spring.datasource.url=jdbc:mysql://localhost:3306/springsecuritybasicdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# App Properties
springsecuritybasic.jwtSecret= librarySecretKey
springsecuritybasic.jwtExpirationMs= 86400000
